# netdata go.d.plugin configuration for Cato Networks
#
# This file is in YAML format.

jobs:
  - name: example
    account_id: "12345"
    api_key: "replace-with-cato-api-key"

    # Cato GraphQL endpoint.
    url: https://api.catonetworks.com/api/v1/graphql2

    # Collection interval. Cato API collection is intentionally not run faster
    # than once per minute.
    update_every: 60
    timeout: 30

    discovery:
      refresh_every: 300
      page_limit: 100

    metrics:
      enabled: auto
      time_frame: last.PT5M
      buckets: 5
      group_interfaces: auto
      max_sites_per_query: 50

    events:
      enabled: auto
      max_pages_per_cycle: 10
      max_cardinality: 50

    bgp:
      enabled: auto
      refresh_every: 300
      max_sites_per_collection: 25

    topology:
      enabled: auto

    retry:
      attempts: 5
      wait_min: 5
      wait_max: 30
